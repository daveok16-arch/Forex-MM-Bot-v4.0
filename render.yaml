services:
  - type: web
    name: forex-signal-bot
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2"
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CONFIG_PATH
        value: "/opt/render/project/src/config/mm_config.yaml"
      - key: SCAN_INTERVAL
        value: "300"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        value: "7779937295"
