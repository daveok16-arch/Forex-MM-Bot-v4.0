services:
  - type: web
    name: forex-signal-bot
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "bash start.sh"
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ONNXRUNTIME_DISABLE_GPU
        value: "1"
      - key: CUDA_VISIBLE_DEVICES
        value: ""
      - key: ORT_DISABLE_GPU
        value: "1"
      - key: CONFIG_PATH
        value: "/opt/render/project/src/config/mm_config.yaml"
      - key: SCAN_INTERVAL
        value: "1800"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        value: "7779937295"
